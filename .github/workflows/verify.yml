name: Verify VALP Examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Smoke test examples (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
        python:
          - "3.9"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install verification dependencies
        run: python -m pip install jsonschema

      - name: Verify examples and audit gates
        shell: bash
        env:
          PYTHON: python
        run: bash scripts/verify-examples.sh
