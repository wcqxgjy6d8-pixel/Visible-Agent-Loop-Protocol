name: Verify VALP Examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Smoke test examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install verification dependencies
        run: python -m pip install jsonschema

      - name: Verify examples and audit gates
        shell: bash
        env:
          PYTHON: python
        run: bash scripts/verify-examples.sh
