name: Documentation issue
description: Improve wording, examples, platform guidance, or onboarding.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Which document or section needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is unclear, missing, outdated, or misleading?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: Optional wording or structure suggestion.
    validations:
      required: false
